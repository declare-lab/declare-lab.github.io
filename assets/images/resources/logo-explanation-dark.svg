<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">The meaning behind the DeCLaRe logo</title>
  <desc id="desc">The DeCLaRe robot represents an intelligent social agent, expressive intelligence, and the Chinese character Xuan meaning to declare.</desc>
  <defs>
        <style>
      .card { fill: none; stroke: #655b7b; stroke-width: 2; }
      .heading { font: 700 31px Inter, Arial, sans-serif; fill: #f4f0ff; }
      .copy { font: 500 24px Inter, Arial, sans-serif; fill: #c9c2d8; }
    </style>
  </defs>

  <text x="600" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="37" font-weight="750" fill="#f4f0ff">DeCLaRe Human-Centered AGI</text>

  <rect x="355" y="98" width="490" height="245" rx="24" fill="none" stroke="#655b7b" stroke-width="2"/>
  <image href="data:image/svg+xml;base64," x="395" y="120" width="410" height="200" preserveAspectRatio="xMidYMid meet"/>

  <rect class="card" x="45" y="395" width="340" height="185" rx="20"/>
  <circle cx="85" cy="440" r="13" fill="#7c3aed"/>
  <text class="heading" x="115" y="451">Social agent</text>
  <text class="copy" x="85" y="500">From IBM-era computing</text>
  <text class="copy" x="85" y="535">to today's social AI.</text>

  <rect class="card" x="430" y="395" width="340" height="185" rx="20"/>
  <circle cx="470" cy="440" r="13" fill="#28b463"/>
  <circle cx="503" cy="440" r="13" fill="#ef4444"/>
  <text class="heading" x="535" y="451">Expressive AI</text>
  <text class="copy" x="470" y="500">Eyes represent the human</text>
  <text class="copy" x="470" y="535">dimensions of intelligence.</text>

  <rect class="card" x="815" y="395" width="340" height="185" rx="20"/>
  <circle cx="855" cy="440" r="13" fill="#7c3aed"/>
  <text class="heading" x="885" y="451">宣 · Xuān</text>
  <text class="copy" x="855" y="500">The robot's form evokes 宣:</text>
  <text class="copy" x="855" y="535">“to declare” or “to proclaim.”</text>

  <text x="600" y="644" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#d8ccff">Constructed · Social · Collaborative</text>
</svg>
