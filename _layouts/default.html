<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  {% include nav.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      toggle.addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    }

    const stickyMenus = Array.from(document.querySelectorAll('.home-index, .page-chip-strip, .pub-toolbar, .pub-year-nav, .section-nav'));
    const sectionMenus = Array.from(document.querySelectorAll('.home-index, .page-chip-strip, .pub-year-nav, .section-nav'));
    const header = document.querySelector('.site-header');
    let stickyFrame = null;

    function getMenuScroller(menu) {
      if (menu.classList.contains('home-index')) return menu.querySelector('.home-index__links') || menu;
      if (menu.classList.contains('pub-year-nav') || menu.classList.contains('section-nav')) return menu.querySelector('div') || menu;
      return menu;
    }

    function keepActiveLinkVisible(menu, link) {
      const isMobileMenu = window.matchMedia('(max-width: 720px)').matches;
      if (!isMobileMenu || !link || menu._currentLink === link) return;

      const scroller = getMenuScroller(menu);
      if (!scroller || scroller.scrollWidth <= scroller.clientWidth + 2) {
        menu._currentLink = link;
        return;
      }

      const scrollerRect = scroller.getBoundingClientRect();
      const linkRect = link.getBoundingClientRect();
      const linkCenter = linkRect.left - scrollerRect.left + scroller.scrollLeft + (linkRect.width / 2);
      const targetLeft = Math.max(0, linkCenter - (scroller.clientWidth / 2));

      scroller.scrollTo({ left: targetLeft, behavior: 'smooth' });
      menu._currentLink = link;
    }

    function updatePageMenus() {
      const headerBottom = header ? header.getBoundingClientRect().bottom : 0;

      stickyMenus.forEach(function(menu) {
        const rect = menu.getBoundingClientRect();
        menu.classList.toggle('is-stuck', rect.top <= headerBottom + 18);
      });

      sectionMenus.forEach(function(menu) {
        const links = Array.from(menu.querySelectorAll('a[href^="#"]'));
        let current = null;
        links.forEach(function(link) {
          const id = decodeURIComponent(link.getAttribute('href').slice(1));
          const section = document.getElementById(id);
          if (section && section.getBoundingClientRect().top <= headerBottom + 96) current = link;
        });
        links.forEach(function(link) {
          link.classList.toggle('is-current', link === current);
        });
        keepActiveLinkVisible(menu, current);
      });
      stickyFrame = null;
    }

    function requestMenuUpdate() {
      if (!stickyFrame) stickyFrame = window.requestAnimationFrame(updatePageMenus);
    }

    if (stickyMenus.length) {
      sectionMenus.forEach(function(menu) {
        const links = Array.from(menu.querySelectorAll('a[href^="#"]'));
        links.forEach(function(link) {
          link.addEventListener('mouseenter', function() {
            link.classList.add('is-hovered');
            keepActiveLinkVisible(menu, link);
          });
          link.addEventListener('mouseleave', function() {
            link.classList.remove('is-hovered');
          });
          link.addEventListener('focus', function() {
            link.classList.add('is-hovered');
            keepActiveLinkVisible(menu, link);
          });
          link.addEventListener('blur', function() {
            link.classList.remove('is-hovered');
          });
        });
      });

      updatePageMenus();
      window.addEventListener('scroll', requestMenuUpdate, { passive: true });
      window.addEventListener('resize', requestMenuUpdate);
      window.addEventListener('load', requestMenuUpdate);
    }
  </script>
</body>
</html>
