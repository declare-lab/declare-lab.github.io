<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  {% include nav.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      toggle.addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    }

    const stickyMenus = Array.from(document.querySelectorAll('.home-index, .page-chip-strip, .pub-toolbar, .pub-year-nav'));
    const fixedMenus = Array.from(document.querySelectorAll('.home-index, .page-chip-strip'));
    const sectionMenus = Array.from(document.querySelectorAll('.home-index, .page-chip-strip, .pub-year-nav'));
    const header = document.querySelector('.site-header');
    let stickyFrame = null;

    fixedMenus.forEach(function(menu) {
      const sentinel = document.createElement('div');
      sentinel.className = 'page-menu-sentinel';
      sentinel.setAttribute('aria-hidden', 'true');
      menu.before(sentinel);
      menu._pageMenuSentinel = sentinel;

      const placeholder = document.createElement('div');
      placeholder.className = 'page-menu-placeholder';
      placeholder.setAttribute('aria-hidden', 'true');
      menu.after(placeholder);
      menu._pageMenuPlaceholder = placeholder;
    });

    function setMenuFixed(menu, shouldFix, fixedTop) {
      const placeholder = menu._pageMenuPlaceholder;
      menu.classList.toggle('is-fixed-menu', shouldFix);
      menu.style.setProperty('--fixed-menu-top', fixedTop + 'px');
      if (placeholder) {
        placeholder.classList.toggle('is-active', shouldFix);
        placeholder.style.setProperty('--page-menu-placeholder-height', shouldFix ? menu.offsetHeight + 'px' : '0px');
      }
    }

    function measureFixedMenus() {
      fixedMenus.forEach(function(menu) {
        const wasFixed = menu.classList.contains('is-fixed-menu');
        const placeholder = menu._pageMenuPlaceholder;
        menu.classList.remove('is-fixed-menu');
        if (placeholder) placeholder.classList.remove('is-active');
        menu.style.setProperty('--fixed-menu-width', menu.getBoundingClientRect().width + 'px');
        if (wasFixed) menu.classList.add('is-fixed-menu');
        if (placeholder && wasFixed) placeholder.classList.add('is-active');
      });
    }

    function updatePageMenus() {
      const headerBottom = header ? header.getBoundingClientRect().bottom : 0;
      const fixedTop = Math.round(headerBottom + 10);

      fixedMenus.forEach(function(menu) {
        const sentinel = menu._pageMenuSentinel;
        const shouldFix = sentinel ? sentinel.getBoundingClientRect().top <= fixedTop : false;
        setMenuFixed(menu, shouldFix, fixedTop);
      });

      stickyMenus.forEach(function(menu) {
        const rect = menu.getBoundingClientRect();
        menu.classList.toggle('is-stuck', rect.top <= headerBottom + 18);
      });

      sectionMenus.forEach(function(menu) {
        const links = Array.from(menu.querySelectorAll('a[href^="#"]'));
        let current = null;
        links.forEach(function(link) {
          const id = decodeURIComponent(link.getAttribute('href').slice(1));
          const section = document.getElementById(id);
          if (section && section.getBoundingClientRect().top <= headerBottom + 96) current = link;
        });
        links.forEach(function(link) {
          link.classList.toggle('is-current', link === current);
        });
      });
      stickyFrame = null;
    }

    function requestMenuUpdate() {
      if (!stickyFrame) stickyFrame = window.requestAnimationFrame(updatePageMenus);
    }

    if (stickyMenus.length) {
      measureFixedMenus();
      updatePageMenus();
      window.addEventListener('scroll', requestMenuUpdate, { passive: true });
      window.addEventListener('resize', function() {
        measureFixedMenus();
        requestMenuUpdate();
      });
      window.addEventListener('load', function() {
        measureFixedMenus();
        requestMenuUpdate();
      });
    }
  </script>
</body>
</html>
