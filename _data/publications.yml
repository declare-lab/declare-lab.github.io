    The note describes the Recognizing Textual Entailment (RTE) system developed at the Computer
    Science and Engineering Department, Jadavpur University, India. In this competition, we have
    participated and submitted the results in the RTE-7 Main Task (3 runs), Novelty Task (3 runs) and
    RTE-7 KBP Validation task (2 unique runs for generic task and 2 unique runs for tailored task). For
    the RTE7 Main and Novelty Tasks, the systems are based on pre-processing tasks which include
    Anaphora Resolution using JavaRAP and the composition of Lexical Entailment, Syntactic Entailment,
    Chunk and Named Entity modules. Reported micro-average scores on the RTE-7 test sets are provided in
    the paper for both main/novelty and KBP validation tasks.

