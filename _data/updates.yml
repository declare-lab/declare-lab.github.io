  title: VentureBeat features δ-mem as working memory for AI agents
  summary: 'VentureBeat interviewed Kyrie Lei and covered δ-mem as a compact 0.12%
    parameter add-on that gives AI agents a lightweight internal working memory. The
    article frames δ-mem as an important move beyond simply expanding context windows
    or adding more RAG: fast, online memory inside the model for long-running agent
    workflows.'
