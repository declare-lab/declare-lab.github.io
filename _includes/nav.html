<header class="site-header">
  <div class="header-inner">
    <a class="site-title site-logo-title" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
      <img class="site-logo site-logo--light" src="{{ '/assets/images/logos/declare-horizontal-light.png' | relative_url }}" alt="{{ site.title }}">
      <img class="site-logo site-logo--dark" src="{{ '/assets/images/logos/declare-horizontal-dark.png' | relative_url }}" alt="{{ site.title }}">
    </a>
    <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="primary-navigation">
      <i class="fas fa-bars menu-icon-open" aria-hidden="true"></i>
      <i class="fas fa-xmark menu-icon-close" aria-hidden="true"></i>
    </button>
    <nav class="nav-links" id="primary-navigation" aria-label="Primary navigation">
      {%- for link in site.data.navigation.main -%}
        {%- if link.url contains '://' -%}
          <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.title }}</a>
        {%- else -%}
          <a href="{{ link.url | relative_url }}" {% if page.url == link.url %}class="active" aria-current="page"{% endif %}>{{ link.title }}</a>
        {%- endif -%}
      {%- endfor -%}
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Use dark theme">
        <span class="theme-icon" aria-hidden="true">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
        <span class="theme-toggle-label">Appearance</span>
        <span class="theme-toggle-value" aria-hidden="true"></span>
      </button>
    </nav>
  </div>
  <div class="nav-scrim" aria-hidden="true"></div>
</header>
<script>
  (function() {
    var menuToggle = document.querySelector('.menu-toggle');
    var nav = document.querySelector('.nav-links');
    var scrim = document.querySelector('.nav-scrim');
    if (!menuToggle || !nav || !scrim) return;

    function setMenu(open) {
      nav.classList.toggle('open', open);
      scrim.classList.toggle('open', open);
      document.body.classList.toggle('menu-open', open);
      menuToggle.setAttribute('aria-expanded', String(open));
      menuToggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    }

    menuToggle.addEventListener('click', function() {
      setMenu(menuToggle.getAttribute('aria-expanded') !== 'true');
    });

    scrim.addEventListener('click', function() { setMenu(false); });
    nav.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() { setMenu(false); });
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape' && menuToggle.getAttribute('aria-expanded') === 'true') {
        setMenu(false);
        menuToggle.focus();
      }
    });

    window.addEventListener('resize', function() {
      if (window.innerWidth > 720) setMenu(false);
    });
  })();
</script>
