<header class="site-header">
  <div class="header-inner">
    <a class="site-title site-logo-title" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
      <img class="site-logo site-logo--light" src="{{ '/assets/images/logos/rec-light.png' | relative_url }}" alt="{{ site.title }}">
      <img class="site-logo site-logo--dark" src="{{ '/assets/images/logos/rec-dark.png' | relative_url }}" alt="{{ site.title }}">
    </a>
    <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <nav class="nav-links">
      {%- for link in site.data.navigation.main -%}
        {%- if link.url contains '://' -%}
          <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.title }}</a>
        {%- else -%}
          <a href="{{ link.url | relative_url }}" {% if page.url == link.url %}class="active"{% endif %}>{{ link.title }}</a>
        {%- endif -%}
      {%- endfor -%}
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </nav>
  </div>
</header>
